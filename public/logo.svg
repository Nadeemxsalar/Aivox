<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">

  <defs>
    <!-- Animated Gradient -->
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C6FF">
        <animate attributeName="offset" values="0;0.2;0" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#FF00C8">
        <animate attributeName="offset" values="0.5;0.7;0.5" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FF8C00">
        <animate attributeName="offset" values="1;0.8;1" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur">
        <animate attributeName="stdDeviation" values="6;12;6" dur="2s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

